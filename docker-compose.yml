services:
  mysql:
    image: mysql:8.4
    container_name: mysql-group10
    restart: unless-stopped
    ports:
      - "3306:3306"
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  jupyter:
    build:
      context: ./jupyter
    container_name: mysql-group10-jupyter
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      DOCKER_STACKS_JUPYTER_CMD: notebook
    ports:
      - "${JUPYTER_PORT}:8888"
    volumes:
      - ./work:/home/jovyan/work

volumes:
  mysql_data:
